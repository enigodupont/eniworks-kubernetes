apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
spec:
  project: default
  destination:
    namespace: immich
    server: https://kubernetes.default.svc
  source:
    chart: immich
    repoURL: "ghcr.io/immich-app/immich-charts"
    targetRevision: 0.13.1
    helm:
      values: |
        controllers:
          main:
            strategy: Recreate
            containers:
              main:
                image:
                  tag: v3.0.0
                env:
                  TZ: "America/Chicago"
                  DB_STORAGE_TYPE: HDD
                  DB_HOSTNAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-app
                        key: host
                  DB_USERNAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-app
                        key: user
                  DB_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-app
                        key: password
                  DB_DATABASE_NAME:
                    valueFrom:
                      secretKeyRef:
                        name: immich-database-app
                        key: dbname

        immich:
          metrics:
            enabled: true
          configuration:
            server:
              externalDomain: https://immich.eniworks.net
            notifications:
              smtp:
                enabled: true
                from: "immich.eniworks.net"
                replyTo: "juramir@protonmail.com"
                transport:
                  host: toolbox.eniworks.net.internal
                  port: 25
          persistence:
            library:
              existingClaim: immich-library-pvc
        valkey:
          enabled: true
          persistence:
            data:
              accessMode: ReadWriteOnce
              type: persistentVolumeClaim
              storageClass: freenas-iscsi-csi
              size: 1Gi
        server:
          ingress:
            main:
              enabled: true # Change this
              hosts:
                - host: immich.eniworks.net
                  paths:
                    - path: "/"
                      service:
                        identifier: main
                - host: internal-immich.eniworks.net
                  paths:
                    - path: "/"
                      service:
                        identifier: main
              tls: []
        machine-learning:
          persistence:
            cache:
              accessMode: ReadWriteOnce
              type: persistentVolumeClaim
              storageClass: freenas-iscsi-csi
              size: 10Gi